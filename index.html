<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Flappy Penguen</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { margin: 0; padding: 0; background: #1a1a1a; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; font-family: 'Arial', sans-serif; }
        canvas { background: #4fc3f7; display: block; max-width: 100%; max-height: 100vh; box-shadow: 0 0 30px rgba(0,0,0,0.7); border-radius: 10px; }
    </style>
</head>
<body>

<canvas id="gameCanvas" width="400" height="600"></canvas>

<script>
const tg = window.Telegram?.WebApp;
if (tg) { tg.ready(); tg.expand(); }

const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

// --- YUMUŞAK FLAPPY BIRD FİZİK AYARLARI ---
let penguin = { 
    x: 60, 
    y: 200, 
    width: 45, 
    height: 45, 
    gravity: 0.25,      // Düşüş yumuşatıldı (Eski: 0.4)
    lift: -5.5,         // Zıplama gücü dengelendi (Eski: -8)
    velocity: 0,
    rotation: 0         // Sağa sola yumuşak dönüş açısı
};

let pipes = [];
let frame = 0;
let score = 0;
let gameOver = false;
let gameStarted = false;
const pipeSpeed = 2.2;  // Boruların akış hızı yavaşlatıldı (Eski: 3.5)

// --- GÖRSEL YÜKLEMELERİ ---
const penguinImg = new Image();
let imgLoaded = false;
penguinImg.onload = () => { imgLoaded = true; if(!gameStarted) drawStartScreen(); };
penguinImg.onerror = () => { imgLoaded = false; if(!gameStarted) drawStartScreen(); };
penguinImg.src = 'penguen.png'; 

// 1. Arka plan görseli ekleme yeri (Klasörüne arkaplan.png atarsan çalışır)
const bgImg = new Image();
let bgLoaded = false;
bgImg.onload = () => { bgLoaded = true; };
bgImg.src = 'arkaplan.png'; 

// 2. Boru görseli ekleme yeri (Klasörüne boru.png atarsan çalışır)
const pipeImg = new Image();
let pipeImgLoaded = false;
pipeImg.onload = () => { pipeImgLoaded = true; };
pipeImg.src = 'boru.png'; 


function jump() {
    if (!gameStarted) {
        gameStarted = true;
        loop();
        return;
    }
    if (gameOver) {
        resetGame();
    } else {
        penguin.velocity = penguin.lift;
    }
}

// Kontroller
window.addEventListener("keydown", (e) => { if (e.code === "Space") jump(); });
canvas.addEventListener("touchstart", (e) => { e.preventDefault(); jump(); }, { passive: false });
canvas.addEventListener("mousedown", jump);

function resetGame() {
    penguin.y = 200;
    penguin.velocity = 0;
    penguin.rotation = 0;
    pipes = [];
    score = 0;
    frame = 0;
    gameOver = false;
    gameStarted = true;
    loop();
}

function drawStartScreen() {
    drawBackground();
    
    ctx.fillStyle = "white";
    ctx.font = "bold 28px Arial";
    ctx.textAlign = "center";
    ctx.fillText("FLAPPY PENGUEN", canvas.width / 2, canvas.height / 2 - 50);
    
    ctx.font = "18px Arial";
    ctx.fillText("Başlamak için Ekrana Dokun", canvas.width / 2, canvas.height / 2 + 20);

    if (imgLoaded) {
        ctx.drawImage(penguinImg, canvas.width / 2 - 22, canvas.height / 2 - 120, 45, 45);
    }
}

function drawBackground() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    if (bgLoaded) {
        ctx.drawImage(bgImg, 0, 0, canvas.width, canvas.height);
    } else {
        ctx.fillStyle = "#2b5c74"; // Görsel yoksa senin o koyu mavi/lacivert renk kalır
        ctx.fillRect(0, 0, canvas.width, canvas.height);
    }
}

function loop() {
    if (!gameStarted) return;

    if (gameOver) {
        ctx.fillStyle = "rgba(0, 0, 0, 0.6)";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "white";
        ctx.font = "bold 30px Arial";
        ctx.textAlign = "center";
        ctx.fillText("OYUN BİTTİ", canvas.width / 2, canvas.height / 2 - 20);
        ctx.font = "20px Arial";
        ctx.fillText(`Skorun: ${score}`, canvas.width / 2, canvas.height / 2 + 20);
        ctx.font = "16px Arial";
        ctx.fillText("Tekrar oynamak için dokun", canvas.width / 2, canvas.height / 2 + 60);
        return;
    }

    drawBackground();

    // Hız ve Rotasyon Hesaplaması (Dönüş Efekti)
    penguin.velocity += penguin.gravity;
    penguin.y += penguin.velocity;

    if (penguin.velocity < 0) {
        penguin.rotation = Math.max(-0.4, penguin.velocity * 0.08); // Yukarı zıplarken kafayı kaldırır
    } else if (penguin.velocity > 0) {
        penguin.rotation = Math.min(1.2, penguin.rotation + 0.04);  // Düşerken kafayı aşağı eğer
    }

    if (penguin.y + penguin.height > canvas.height || penguin.y < 0) {
        gameOver = true;
    }

    // --- PENGUENİ DÖNDÜREREK ÇİZME ALANI ---
    ctx.save();
    ctx.translate(penguin.x + penguin.width / 2, penguin.y + penguin.height / 2);
    ctx.rotate(penguin.rotation);
    if (imgLoaded) {
        ctx.drawImage(penguinImg, -penguin.width / 2, -penguin.height / 2, penguin.width, penguin.height);
    } else {
        ctx.fillStyle = "orange";
        ctx.fillRect(-penguin.width / 2, -penguin.height / 2, penguin.width, penguin.height);
    }
    ctx.restore();

    // --- ENGELLER (BORULAR) ---
    if (frame % 110 === 0) { // Boruların sıklığı ideal mesafeye çekildi
        let gap = 145;      // Penguenin geçeceği boşluk biraz genişletildi
        let topHeight = Math.floor(Math.random() * (canvas.height - gap - 200)) + 50;
        pipes.push({ x: canvas.width, top: topHeight, bottom: canvas.height - topHeight - gap, width: 65, counted: false });
    }

    for (let i = pipes.length - 1; i >= 0; i--) {
        pipes[i].x -= pipeSpeed;

        if (pipeImgLoaded) {
            // Boru görseli varsa ters ve düz olarak basar
            ctx.drawImage(pipeImg, pipes[i].x, 0, pipes[i].width, pipes[i].top);
            ctx.drawImage(pipeImg, pipes[i].x, canvas.height - pipes[i].bottom, pipes[i].width, pipes[i].bottom);
        } else {
            // Boru görseli yoksa gri blokları çizer
            ctx.fillStyle = "#737373";
            ctx.fillRect(pipes[i].x, 0, pipes[i].width, pipes[i].top);
            ctx.fillRect(pipes[i].x, canvas.height - pipes[i].bottom, pipes[i].width, pipes[i].bottom);
        }

        // Hassas Çarpışma Testi
        if (penguin.x + 5 < pipes[i].x + pipes[i].width && penguin.x + penguin.width - 5 > pipes[i].x) {
            if (penguin.y + 5 < pipes[i].top || penguin.y + penguin.height - 5 > canvas.height - pipes[i].bottom) {
                gameOver = true;
            }
        }

        // Skor Sayacı
        if (!pipes[i].counted && pipes[i].x + pipes[i].width / 2 < penguin.x) {
            score++;
            pipes[i].counted = true;
        }

        if (pipes[i].x + pipes[i].width < 0) {
            pipes.splice(i, 1);
        }
    }

    // Skor Tablosu
    ctx.fillStyle = "white";
    ctx.font = "bold 45px Arial";
    ctx.textAlign = "center";
    ctx.fillText(score, canvas.width / 2, 60);

    frame++;
    requestAnimationFrame(loop);
}

setTimeout(() => { if (!gameStarted) drawStartScreen(); }, 200);
</script>
</body>
</html>
