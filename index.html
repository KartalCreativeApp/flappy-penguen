<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Flappy Penguen</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { margin: 0; padding: 0; background: #1a1a1a; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; font-family: 'Arial', sans-serif; }
        canvas { background: #70c5ce; display: block; max-width: 100%; max-height: 100vh; box-shadow: 0 0 30px rgba(0,0,0,0.8); border-radius: 10px; }
    </style>
</head>
<body>

<canvas id="gameCanvas" width="400" height="600"></canvas>

<script>
const tg = window.Telegram?.WebApp;
if (tg) { tg.ready(); tg.expand(); }

const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

// --- ZAMANLAYICI (SABİT 60FPS SİMÜLASYONU) ---
let lastTime = performance.now();

// --- KESİNTİSİZ FLAPPY BIRD FİZİKLERİ ---
let penguin = { 
    x: 70, 
    y: 250, 
    width: 40, 
    height: 40, 
    gravity: 0.35,      // Düşüş hızı süzülme için optimize edildi
    lift: -6.8,         // Zıplama yüksekliği ağırlık hissi için dengelendi
    velocity: 0,
    rotation: 0
};

let pipes = [];
let frame = 0;
let score = 0;
let gameOver = false;
let gameStarted = false;

// Sabit akış hızları
const pipeSpeed = 1.8;   // Yavaş, tatlı ve süzülen boru akışı
const pipeInterval = 130; // Boruların geliş sıklığı (Geniş aralık)

// Görsel Yüklemeleri
const penguinImg = new Image();
let imgLoaded = false;
penguinImg.onload = () => { imgLoaded = true; if(!gameStarted) drawStartScreen(); };
penguinImg.onerror = () => { imgLoaded = false; if(!gameStarted) drawStartScreen(); };
penguinImg.src = 'penguen.png'; 

function jump() {
    if (!gameStarted) {
        gameStarted = true;
        lastTime = performance.now();
        loop();
        return;
    }
    if (gameOver) {
        resetGame();
    } else {
        penguin.velocity = penguin.lift; // İvme sıfırlanıp yukarı süzülür
    }
}

// Kontroller
window.addEventListener("keydown", (e) => { if (e.code === "Space") jump(); });
canvas.addEventListener("touchstart", (e) => { e.preventDefault(); jump(); }, { passive: false });
canvas.addEventListener("mousedown", jump);

function resetGame() {
    penguin.y = 250;
    penguin.velocity = 0;
    penguin.rotation = 0;
    pipes = [];
    frame = 0;
    score = 0;
    gameOver = false;
    gameStarted = true;
    lastTime = performance.now();
    loop();
}

function drawStartScreen() {
    ctx.fillStyle = "#70c5ce"; 
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    
    ctx.fillStyle = "white";
    ctx.font = "bold 28px Arial";
    ctx.textAlign = "center";
    ctx.fillText("FLAPPY PENGUEN", canvas.width / 2, canvas.height / 2 - 50);
    
    ctx.font = "18px Arial";
    ctx.fillText("Başlamak için Dokun", canvas.width / 2, canvas.height / 2 + 20);

    if (imgLoaded) {
        ctx.drawImage(penguinImg, canvas.width / 2 - 20, canvas.height / 2 - 120, 40, 40);
    }
}

// --- ATILAN SS'TEKİ ORİJİNAL FLAPPY BIRD BORU ÇİZİMİ ---
function drawOriginalPipe(x, top, bottom, width) {
    const drawSinglePipe = (pipeX, pipeY, pipeHeight, isTop) => {
        // Yumuşak kenar algısı için dış koyu kontur
        ctx.strokeStyle = "#543847"; // Orijinal koyu kahve/siyah boru sınırı
        ctx.lineWidth = 2;

        // Boru Gövdesi İçin Renk Katmanları (Işık sol üstten vuruyor)
        // 1. Koyu Yeşil Gölge Alanı (Sağ taraf)
        ctx.fillStyle = "#5c8122";
        ctx.fillRect(pipeX, pipeY, width, pipeHeight);
        
        // 2. Ana Canlı Yeşil (Orta kısım)
        ctx.fillStyle = "#73bf2e";
        ctx.fillRect(pipeX + 3, pipeY, width - 12, pipeHeight);

        // 3. Açık Yeşil Parlama Şeridi (Sol kısım)
        ctx.fillStyle = "#9de64a";
        ctx.fillRect(pipeX + 4, pipeY, 8, pipeHeight);

        // Dış hat çizgileri
        ctx.beginPath();
        ctx.moveTo(pipeX, pipeY);
        ctx.lineTo(pipeX, pipeY + pipeHeight);
        ctx.moveTo(pipeX + width, pipeY);
        ctx.lineTo(pipeX + width, pipeY + pipeHeight);
        ctx.stroke();

        // --- BORU BAŞLIĞI (UÇ KISIMDAKİ BÜYÜK YUMUŞAK HALKA) ---
        let capHeight = 26;
        let capX = pipeX - 3;
        let capY = isTop ? pipeY + pipeHeight - capHeight : pipeY;

        // Başlık Gövde Gölgelendirmesi
        ctx.fillStyle = "#5c8122"; // Gölge
        ctx.fillRect(capX, capY, width + 6, capHeight);
        ctx.fillStyle = "#73bf2e"; // Ana yeşil
        ctx.fillRect(capX + 3, capY, width, capHeight);
        ctx.fillStyle = "#9de64a"; // Parlama
        ctx.fillRect(capX + 4, capY, 8, capHeight);

        // Başlığın etrafına yumuşak çerçeve çizgisi
        ctx.strokeRect(capX, capY, width + 6, capHeight);
        
        // Gövde ile birleştiği yere gölge çizgisi
        ctx.fillStyle = "#543847";
        if (isTop) {
            ctx.fillRect(capX, capY, width + 6, 2);
        } else {
            ctx.fillRect(capX, capY + capHeight - 2, width + 6, 2);
        }
    };

    // Üst ve Alt boruları çiz
    drawSinglePipe(x, 0, top, true);
    drawSinglePipe(x, canvas.height - bottom, bottom, false);
}

function loop() {
    if (!gameStarted) return;

    if (gameOver) {
        ctx.fillStyle = "rgba(0, 0, 0, 0.55)";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "white";
        ctx.font = "bold 30px Arial";
        ctx.textAlign = "center";
        ctx.fillText("OYUN BİTTİ", canvas.width / 2, canvas.height / 2 - 20);
        ctx.font = "20px Arial";
        ctx.fillText(`Skorun: ${score}`, canvas.width / 2, canvas.height / 2 + 20);
        ctx.font = "16px Arial";
        ctx.fillText("Tekrar oynamak için dokun", canvas.width / 2, canvas.height / 2 + 60);
        return;
    }

    // Ekranı Temizle
    ctx.fillStyle = "#70c5ce"; 
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // GERÇEKÇİ AKICI YERÇEKİMİ ETKİSİ
    penguin.velocity += penguin.gravity;
    penguin.y += penguin.velocity;

    // Yumuşak ve Süzülen Rotasyon (Aşağı yukarı kafa bükme)
    if (penguin.velocity < 0) {
        // Zıplarken kafayı yukarı kaldırır (Yumuşak açı)
        penguin.rotation = -0.25;
    } else {
        // Düşerken kademeli ve ağır bir şekilde aşağı bükülür
        penguin.rotation = Math.min(1.0, penguin.rotation + 0.03);
    }

    // Tavan ve Taban Kontrolü
    if (penguin.y + penguin.height > canvas.height || penguin.y < 0) {
        gameOver = true;
    }

    // Pengueni Çiz (Rotasyon Merkezli)
    ctx.save();
    ctx.translate(penguin.x + penguin.width / 2, penguin.y + penguin.height / 2);
    ctx.rotate(penguin.rotation);
    if (imgLoaded) {
        ctx.drawImage(penguinImg, -penguin.width / 2, -penguin.height / 2, penguin.width, penguin.height);
    } else {
        ctx.fillStyle = "#333";
        ctx.fillRect(-penguin.width / 2, -penguin.height / 2, penguin.width, penguin.height);
    }
    ctx.restore();

    // Boru Üretim Döngüsü
    if (frame % pipeInterval === 0) {
        let gap = 155; // Süzülüp rahat geçebilmen için dikey boşluk genişletildi (Eski: 140)
        let topHeight = Math.floor(Math.random() * (canvas.height - gap - 240)) + 60;
        pipes.push({ x: canvas.width, top: topHeight, bottom: canvas.height - topHeight - gap, width: 62, counted: false });
    }

    // Boruları Yürüt ve Çiz
    for (let i = pipes.length - 1; i >= 0; i--) {
        pipes[i].x -= pipeSpeed; // Yavaşlatılmış, insani hız

        // Yeni Yumuşak Hatlı Akıllı Borular Çiziliyor
        drawOriginalPipe(pipes[i].x, pipes[i].top, pipes[i].bottom, pipes[i].width);

        // Hassaslaştırılmış Çarpışma Testi (Kenarlardan 5 piksel tölerans - haksız ölümleri önler)
        if (penguin.x + 5 < pipes[i].x + pipes[i].width && penguin.x + penguin.width - 5 > pipes[i].x) {
            if (penguin.y + 5 < pipes[i].top || penguin.y + penguin.height - 5 > canvas.height - pipes[i].bottom) {
                gameOver = true;
            }
        }

        // Skor Sayacı
        if (!pipes[i].counted && pipes[i].x + pipes[i].width / 2 < penguin.x) {
            score++;
            pipes[i].counted = true;
        }

        if (pipes[i].x + pipes[i].width < 0) {
            pipes.splice(i, 1);
        }
    }

    // Skor Tablosu
    ctx.fillStyle = "white";
    ctx.font = "bold 45px Arial";
    ctx.textAlign = "center";
    ctx.fillText(score, canvas.width / 2, 60);

    frame++;
    requestAnimationFrame(loop);
}

// İlk render tetikleyici
setTimeout(() => { if (!gameStarted) drawStartScreen(); }, 100);
</script>
</body>
</html>
