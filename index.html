<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Flappy Penguen</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { margin: 0; padding: 0; background: #1a1a1a; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; font-family: 'Arial', sans-serif; }
        canvas { background: #4fc3f7; display: block; max-width: 100%; max-height: 100vh; box-shadow: 0 0 30px rgba(0,0,0,0.7); border-radius: 10px; }
    </style>
</head>
<body>

<canvas id="gameCanvas" width="400" height="600"></canvas>

<script>
const tg = window.Telegram?.WebApp;
if (tg) { tg.ready(); tg.expand(); }

const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

// --- ZAMAN SABİTLEME (DELTA TIME) DEĞİŞKENLERİ ---
let lastTime = performance.now();

// --- GERÇEK FLAPPY BIRD FİZİK AYARLARI ---
let penguin = { 
    x: 60, 
    y: 250, 
    width: 42, 
    height: 42, 
    gravity: 24,       // Saniyede uygulanan yerçekimi (Çok soft düşüş)
    lift: -320,        // Zıplama ivmesi (Yukarı doğru süzülerek fırlama)
    velocity: 0,
    rotation: 0
};

let pipes = [];
let pipeSpawnTimer = 0;
const pipeSpawnInterval = 2.4; // Kaç saniyede bir yeni boru gelsin?
const pipeSpeed = 130;         // Boruların saniyedeki kayma hızı (Yavaş ve tatlı akış)
let score = 0;
let gameOver = false;
let gameStarted = false;

// --- GÖRSEL YÜKLEMELERİ ---
const penguinImg = new Image();
let imgLoaded = false;
penguinImg.onload = () => { imgLoaded = true; if(!gameStarted) drawStartScreen(); };
penguinImg.onerror = () => { imgLoaded = false; if(!gameStarted) drawStartScreen(); };
penguinImg.src = 'penguen.png'; 

const bgImg = new Image();
let bgLoaded = false;
bgImg.onload = () => { bgLoaded = true; };
bgImg.src = 'arkaplan.png'; 

const pipeImg = new Image();
let pipeImgLoaded = false;
pipeImg.onload = () => { pipeImgLoaded = true; };
pipeImg.src = 'boru.png'; 

function jump() {
    if (!gameStarted) {
        gameStarted = true;
        lastTime = performance.now();
        requestAnimationFrame(loop);
        return;
    }
    if (gameOver) {
        resetGame();
    } else {
        penguin.velocity = penguin.lift; // Sabit zıplama kuvveti
    }
}

// Kontroller
window.addEventListener("keydown", (e) => { if (e.code === "Space") jump(); });
canvas.addEventListener("touchstart", (e) => { e.preventDefault(); jump(); }, { passive: false });
canvas.addEventListener("mousedown", jump);

function resetGame() {
    penguin.y = 250;
    penguin.velocity = 0;
    penguin.rotation = 0;
    pipes = [];
    pipeSpawnTimer = 0;
    score = 0;
    gameOver = false;
    gameStarted = true;
    lastTime = performance.now();
    requestAnimationFrame(loop);
}

function drawStartScreen() {
    drawBackground();
    
    ctx.fillStyle = "white";
    ctx.font = "bold 28px Arial";
    ctx.textAlign = "center";
    ctx.fillText("FLAPPY PENGUEN", canvas.width / 2, canvas.height / 2 - 50);
    
    ctx.font = "18px Arial";
    ctx.fillText("Başlamak için Ekrana Dokun", canvas.width / 2, canvas.height / 2 + 20);

    if (imgLoaded) {
        ctx.drawImage(penguinImg, canvas.width / 2 - 21, canvas.height / 2 - 120, 42, 42);
    }
}

function drawBackground() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    if (bgLoaded) {
        ctx.drawImage(bgImg, 0, 0, canvas.width, canvas.height);
    } else {
        ctx.fillStyle = "#2b5c74"; 
        ctx.fillRect(0, 0, canvas.width, canvas.height);
    }
}

// --- YUMUŞAK TASARIMLI VE BAŞLIKLI BORU ÇİZİCİ ---
function drawSoftPipe(x, top, bottom, width) {
    ctx.fillStyle = "#73bf2e";   // Boru ana rengi (Tatlı yeşil)
    ctx.strokeStyle = "#4e851a"; // Kenar çizgisi rengi
    ctx.lineWidth = 3;

    // 1. ÜST BORU (Gövde)
    ctx.fillRect(x + 4, 0, width - 8, top - 20);
    ctx.strokeRect(x + 4, -10, width - 8, top - 10);
    // Üst Boru Başlığı (Geniş ve yumuşak kenarlı kısım)
    ctx.fillRect(x, top - 25, width, 25);
    ctx.strokeRect(x, top - 25, width, 25);

    // 2. ALT BORU (Gövde)
    ctx.fillRect(x + 4, canvas.height - bottom + 20, width - 8, bottom - 20);
    ctx.strokeRect(x + 4, canvas.height - bottom + 20, width - 8, bottom + 10);
    // Alt Boru Başlığı
    ctx.fillRect(x, canvas.height - bottom, width, 25);
    ctx.strokeRect(x, canvas.height - bottom, width, 25);
}

function loop(currentTime) {
    if (!gameStarted) return;

    // Saniyedeki kare hızından bağımsız zaman hesabı (dt)
    let dt = (currentTime - lastTime) / 1000;
    if (dt > 0.1) dt = 0.1; // Tarayıcı sekme değiştirirse sapıtmasın diye sınır
    lastTime = currentTime;

    if (gameOver) {
        ctx.fillStyle = "rgba(0, 0, 0, 0.6)";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "white";
        ctx.font = "bold 30px Arial";
        ctx.textAlign = "center";
        ctx.fillText("OYUN BİTTİ", canvas.width / 2, canvas.height / 2 - 20);
        ctx.font = "20px Arial";
        ctx.fillText(`Skorun: ${score}`, canvas.width / 2, canvas.height / 2 + 20);
        ctx.font = "16px Arial";
        ctx.fillText("Tekrar oynamak için dokun", canvas.width / 2, canvas.height / 2 + 60);
        return;
    }

    drawBackground();

    // Fizik Güncellemeleri (Zamana Bağlı)
    penguin.velocity += penguin.gravity * dt * 60;
    penguin.y += penguin.velocity * dt;

    // Yumuşak Rotasyon (Dönüş) Hesaplaması
    if (penguin.velocity < 0) {
        penguin.rotation = -0.3; // Zıplarken sabit yukarı bakış açısı
    } else {
        penguin.rotation = Math.min(1.1, penguin.rotation + 3 * dt); // Düşerken kademeli aşağı süzülme
    }

    if (penguin.y + penguin.height > canvas.height || penguin.y < 0) {
        gameOver = true;
    }

    // Pengueni Çiz
    ctx.save();
    ctx.translate(penguin.x + penguin.width / 2, penguin.y + penguin.height / 2);
    ctx.rotate(penguin.rotation);
    if (imgLoaded) {
        ctx.drawImage(penguinImg, -penguin.width / 2, -penguin.height / 2, penguin.width, penguin.height);
    } else {
        ctx.fillStyle = "orange";
        ctx.fillRect(-penguin.width / 2, -penguin.height / 2, penguin.width, penguin.height);
    }
    ctx.restore();

    // Zaman Ayarlı Boru Ekleme mekanizması
    pipeSpawnTimer += dt;
    if (pipeSpawnTimer >= pipeSpawnInterval) {
        let gap = 140; // Penguenin rahat geçebileceği ideal boşluk
        let topHeight = Math.floor(Math.random() * (canvas.height - gap - 220)) + 60;
        pipes.push({ x: canvas.width, top: topHeight, bottom: canvas.height - topHeight - gap, width: 68, counted: false });
        pipeSpawnTimer = 0;
    }

    // Boruları Yürüt ve Çiz
    for (let i = pipes.length - 1; i >= 0; i--) {
        pipes[i].x -= pipeSpeed * dt;

        if (pipeImgLoaded) {
            ctx.drawImage(pipeImg, pipes[i].x, 0, pipes[i].width, pipes[i].top);
            ctx.drawImage(pipeImg, pipes[i].x, canvas.height - pipes[i].bottom, pipes[i].width, pipes[i].bottom);
        } else {
            // Görsel yoksa kodla çizdiğimiz o yeni yumuşak hatlı yeşil boruları kullanır
            drawSoftPipe(pipes[i].x, pipes[i].top, pipes[i].bottom, pipes[i].width);
        }

        // Yumuşatılmış Çarpışma Kutusu (Kafadan ve arkadan hafif pay bırakır ki haksız yere yanmasın)
        if (penguin.x + 6 < pipes[i].x + pipes[i].width && penguin.x + penguin.width - 6 > pipes[i].x) {
            if (penguin.y + 6 < pipes[i].top || penguin.y + penguin.height - 6 > canvas.height - pipes[i].bottom) {
                gameOver = true;
            }
        }

        // Skor Hesaplama
        if (!pipes[i].counted && pipes[i].x + pipes[i].width / 2 < penguin.x) {
            score++;
            pipes[i].counted = true;
        }

        if (pipes[i].x + pipes[i].width < 0) {
            pipes.splice(i, 1);
        }
    }

    // Skor Tablosu
    ctx.fillStyle = "white";
    ctx.font = "bold 45px Arial";
    ctx.textAlign = "center";
    ctx.fillText(score, canvas.width / 2, 60);

    requestAnimationFrame(loop);
}

// İlk ekranı ayarla
setTimeout(() => { if (!gameStarted) drawStartScreen(); }, 150);
</script>
</body>
</html>
